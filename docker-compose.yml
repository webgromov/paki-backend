services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paki}
      POSTGRES_DB: ${POSTGRES_DB:-paki_support}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paki}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
