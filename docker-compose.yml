services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paki}
      POSTGRES_DB: ${POSTGRES_DB:-paki_support}
    ports:
      - "5450:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paki}"]
      interval: 5s
      timeout: 5s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./infra/centrifugo/config.json:/centrifugo/config.json
    command: centrifugo -c config.json
    ports:
      - "8000:8000"

volumes:
  postgres_data:
